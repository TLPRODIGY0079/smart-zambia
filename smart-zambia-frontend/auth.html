<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Zambia - Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #E85D04 0%, #DC2626 50%, #991B1B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .font-display { font-family: 'Playfair Display', serif; }
    .auth-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      max-width: 900px;
      width: 90%;
      display: flex;
    }
    .auth-image {
      background: url('https://images.unsplash.com/photo-1568625502763-2a5ec6a94c47?w=800') center/cover;
      min-width: 45%;
      position: relative;
    }
    .auth-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,93,4,0.8) 0%, rgba(220,38,2,0.6) 100%);
    }
    .auth-form {
      flex: 1;
      padding: 48px;
    }
    .input-group { margin-bottom: 20px; }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #E85D04;
      box-shadow: 0 0 0 3px rgba(232,93,4,0.1);
    }
    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #E85D04 0%, #DC2626 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(232,93,4,0.3);
    }
    .btn-secondary {
      background: #F3F4F6;
      color: #374151;
      margin-top: 12px;
    }
    .btn-secondary:hover {
      background: #E5E7EB;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      color: #374151;
    }
    .social-btn:hover {
      border-color: #E85D04;
      background: #FFFBF5;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #9CA3AF;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }
    .divider span { padding: 0 16px; }
    .role-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #F3F4F6;
      padding: 4px;
      border-radius: 12px;
    }
    .role-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6B7280;
      transition: all 0.3s;
    }
    .role-btn.active {
      background: white;
      color: #E85D04;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .error-message {
      background: #FEE2E2;
      color: #991B1B;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .success-message {
      background: #D1FAE5;
      color: #065F46;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    @media (max-width: 768px) {
      .auth-card { flex-direction: column; }
      .auth-image { min-height: 200px; min-width: 100%; }
      .auth-form { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-image"></div>
    <div class="auth-form">
      <div id="loginForm">
        <h1 class="font-display text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-gray-600 mb-8">Sign in to continue your Zambian adventure</p>

        <div class="role-selector">
          <button class="role-btn active" data-role="international_tourist" onclick="selectRole('international_tourist')">
            <i class="fas fa-globe mr-2"></i>International
          </button>
          <button class="role-btn" data-role="local_tourist" onclick="selectRole('local_tourist')">
            <i class="fas fa-home mr-2"></i>Local
          </button>
          <button class="role-btn" data-role="tour_guide" onclick="selectRole('tour_guide')">
            <i class="fas fa-user-tie mr-2"></i>Tour Guide
          </button>
        </div>

        <div id="loginError" class="error-message"></div>
        <div id="loginSuccess" class="success-message"></div>

        <form onsubmit="handleLogin(event)">
          <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" required placeholder="you@example.com">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required placeholder="••••••••">
          </div>
          <div class="flex justify-between items-center mb-6">
            <label class="flex items-center gap-2 text-sm text-gray-600">
              <input type="checkbox" class="w-4 h-4 rounded">
              Remember me
            </label>
            <a href="#" onclick="showResetPassword()" class="text-sm text-orange-600 hover:text-orange-700 font-medium">
              Forgot password?
            </a>
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
          </button>
        </form>

        <div class="divider">
          <span>or continue with</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button class="social-btn" onclick="handleGoogleLogin()">
            <i class="fab fa-google text-red-500"></i>
            Google
          </button>
          <button class="social-btn" onclick="handleFacebookLogin()">
            <i class="fab fa-facebook text-blue-600"></i>
            Facebook
          </button>
        </div>

        <p class="text-center text-gray-600 mt-6">
          Don't have an account? 
          <a href="#" onclick="showRegister()" class="text-orange-600 hover:text-orange-700 font-medium">Sign up</a>
        </p>
      </div>

      <div id="registerForm" style="display: none;">
        <h1 class="font-display text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
        <p class="text-gray-600 mb-8">Join Smart Zambia and start exploring</p>

        <div class="role-selector">
          <button class="role-btn active" data-role="international_tourist" onclick="selectRole('international_tourist')">
            <i class="fas fa-globe mr-2"></i>International
          </button>
          <button class="role-btn" data-role="local_tourist" onclick="selectRole('local_tourist')">
            <i class="fas fa-home mr-2"></i>Local
          </button>
          <button class="role-btn" data-role="tour_guide" onclick="selectRole('tour_guide')">
            <i class="fas fa-user-tie mr-2"></i>Tour Guide
          </button>
        </div>

        <div id="registerError" class="error-message"></div>
        <div id="registerSuccess" class="success-message"></div>

        <form onsubmit="handleRegister(event)">
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="registerName" required placeholder="John Doe">
          </div>
          <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="registerEmail" required placeholder="you@example.com">
          </div>
          <div class="input-group">
            <label>Password (min 8 chars, uppercase, lowercase, number)</label>
            <input type="password" id="registerPassword" required placeholder="••••••••">
          </div>
          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="registerConfirmPassword" required placeholder="••••••••">
          </div>
          
          <div id="localFields" style="display: none;">
            <div class="input-group">
              <label>Phone Number (for local verification)</label>
              <input type="tel" id="registerPhone" placeholder="+260 XXX XXX XXX">
            </div>
            <div class="input-group">
              <label>NRC Number (optional)</label>
              <input type="text" id="registerNRC" placeholder="XXXXXX/XX/X">
            </div>
          </div>

          <button type="submit" class="btn btn-primary">
            <i class="fas fa-user-plus mr-2"></i>Create Account
          </button>
        </form>

        <div class="divider">
          <span>or sign up with</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button class="social-btn" onclick="handleGoogleLogin()">
            <i class="fab fa-google text-red-500"></i>
            Google
          </button>
          <button class="social-btn" onclick="handleFacebookLogin()">
            <i class="fab fa-facebook text-blue-600"></i>
            Facebook
          </button>
        </div>

        <p class="text-center text-gray-600 mt-6">
          Already have an account? 
          <a href="#" onclick="showLogin()" class="text-orange-600 hover:text-orange-700 font-medium">Sign in</a>
        </p>
      </div>

      <div id="resetForm" style="display: none;">
        <h1 class="font-display text-3xl font-bold text-gray-900 mb-2">Reset Password</h1>
        <p class="text-gray-600 mb-8">Enter your email to receive a reset link</p>

        <div id="resetError" class="error-message"></div>
        <div id="resetSuccess" class="success-message"></div>

        <form onsubmit="handleResetPassword(event)">
          <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="resetEmail" required placeholder="you@example.com">
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
          </button>
        </form>

        <button class="btn btn-secondary" onclick="showLogin()">
          <i class="fas fa-arrow-left mr-2"></i>Back to Sign In
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, authService } from './supabase/client.js';

    let selectedRole = 'international_tourist';

    window.selectRole = (role) => {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.role === role) {
          btn.classList.add('active');
        }
      });

      // Show/hide local fields
      const localFields = document.getElementById('localFields');
      if (role === 'local_tourist' || role === 'tour_guide') {
        localFields.style.display = 'block';
      } else {
        localFields.style.display = 'none';
      }
    };

    window.showLogin = () => {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'none';
    };

    window.showRegister = () => {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    };

    window.showResetPassword = () => {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
    };

    window.showError = (elementId, message) => {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    };

    window.showSuccess = (elementId, message) => {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    };

    window.handleLogin = async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const { data, error } = await authService.signIn(email, password);
        if (error) throw error;

        showSuccess('loginSuccess', 'Login successful! Redirecting...');
        
        // Store role preference
        localStorage.setItem('preferredRole', selectedRole);
        
        // Redirect to main app
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1500);
      } catch (error) {
        showError('loginError', error.message || 'Login failed. Please try again.');
      }
    };

    window.handleRegister = async (e) => {
      e.preventDefault();
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;

      if (password !== confirmPassword) {
        showError('registerError', 'Passwords do not match');
        return;
      }

      const metadata = {
        full_name: name,
        role: selectedRole
      };

      if (selectedRole === 'local_tourist' || selectedRole === 'tour_guide') {
        metadata.phone_number = document.getElementById('registerPhone').value;
        metadata.nrc_number = document.getElementById('registerNRC').value;
      }

      try {
        const { data, error } = await authService.signUp(email, password, metadata);
        if (error) throw error;

        showSuccess('registerSuccess', 'Account created! Check your email to confirm.');
        
        // Create profile
        if (data.user) {
          await supabase.from('profiles').insert({
            id: data.user.id,
            username: email.split('@')[0],
            full_name: name,
            preferred_language: 'en'
          });

          // Assign role
          await supabase.from('user_roles').insert({
            user_id: data.user.id,
            role: selectedRole,
            verified: selectedRole === 'international_tourist'
          });
        }

        setTimeout(() => {
          window.location.href = '/index.html';
        }, 2000);
      } catch (error) {
        showError('registerError', error.message || 'Registration failed. Please try again.');
      }
    };

    window.handleResetPassword = async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;

      try {
        await authService.resetPassword(email);
        showSuccess('resetSuccess', 'Password reset link sent to your email!');
      } catch (error) {
        showError('resetError', error.message || 'Failed to send reset link.');
      }
    };

    window.handleGoogleLogin = async () => {
      try {
        await authService.signInWithGoogle();
      } catch (error) {
        showError('loginError', error.message || 'Google login failed.');
      }
    };

    window.handleFacebookLogin = async () => {
      try {
        await authService.signInWithFacebook();
      } catch (error) {
        showError('loginError', error.message || 'Facebook login failed.');
      }
    };

    // Check for existing session
    (async () => {
      const session = await authService.getSession();
      if (session) {
        window.location.href = '/index.html';
      }
    })();
  </script>
</body>
</html>
