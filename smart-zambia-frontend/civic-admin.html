<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Zambia - Civic Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com" integrity="sha384-4fNyHlqJp4NUjsf8QzFjKzP5zP5zP5zP5zP5zP5zP5zP5zP5zP5zP5zP5zP5zP5z" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" integrity="sha256-Fgm10CEX/QnwKXdQNzNMuLuPNHo0t5dZSYjGNeedKME=" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center gap-4">
                        <h1 class="text-2xl font-bold text-gray-900">
                            <i class="fas fa-shield-alt text-blue-500 mr-2"></i>
                            Civic Admin Dashboard
                        </h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="adminUser" class="text-gray-600"></span>
                        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                            <i class="fas fa-sign-out-alt mr-1"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Login Form (hidden when logged in) -->
        <div id="loginForm" class="max-w-md mx-auto mt-20 bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>
            <form onsubmit="adminLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" id="loginEmail" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="loginPassword" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                    Login
                </button>
            </form>
        </div>

        <!-- Dashboard Content (hidden when not logged in) -->
        <div id="dashboardContent" class="hidden">
            <!-- Stats Cards -->
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex items-center">
                            <div class="p-2 bg-blue-100 rounded-lg">
                                <i class="fas fa-exclamation-triangle text-blue-600 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-gray-600">Total Reports</p>
                                <p id="totalReports" class="text-2xl font-semibold text-gray-900">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex items-center">
                            <div class="p-2 bg-yellow-100 rounded-lg">
                                <i class="fas fa-clock text-yellow-600 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-gray-600">Pending</p>
                                <p id="pendingReports" class="text-2xl font-semibold text-gray-900">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex items-center">
                            <div class="p-2 bg-green-100 rounded-lg">
                                <i class="fas fa-check-circle text-green-600 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-gray-600">Resolved</p>
                                <p id="resolvedReports" class="text-2xl font-semibold text-gray-900">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex items-center">
                            <div class="p-2 bg-purple-100 rounded-lg">
                                <i class="fas fa-users text-purple-600 text-xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-gray-600">Active Users</p>
                                <p id="activeUsers" class="text-2xl font-semibold text-gray-900">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold mb-4">Reports by Type</h3>
                        <canvas id="reportsTypeChart" width="400" height="200"></canvas>
                    </div>
                    
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold mb-4">Reports by Status</h3>
                        <canvas id="reportsStatusChart" width="400" height="200"></canvas>
                    </div>
                </div>

                <!-- Reports Map -->
                <div class="bg-white rounded-lg shadow p-6 mb-8">
                    <h3 class="text-lg font-semibold mb-4">Reports Map</h3>
                    <div id="reportsMap" style="height: 400px; border-radius: 8px;"></div>
                </div>

                <!-- Reports Table -->
                <div class="bg-white rounded-lg shadow">
                    <div class="px-6 py-4 border-b border-gray-200">
                        <div class="flex justify-between items-center">
                            <h3 class="text-lg font-semibold">Recent Reports</h3>
                            <div class="flex gap-2">
                                <select id="statusFilter" onchange="loadReports()" class="px-3 py-1 border rounded">
                                    <option value="">All Status</option>
                                    <option value="pending">Pending</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="resolved">Resolved</option>
                                </select>
                                <select id="typeFilter" onchange="loadReports()" class="px-3 py-1 border rounded">
                                    <option value="">All Types</option>
                                    <option value="pothole">Potholes</option>
                                    <option value="flooding">Flooding</option>
                                    <option value="streetlight">Streetlights</option>
                                    <option value="waste">Waste</option>
                                    <option value="transport">Transport</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Report</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reporter</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="reportsTableBody" class="bg-white divide-y divide-gray-200">
                                <!-- Reports will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Top Contributors -->
                <div class="bg-white rounded-lg shadow p-6 mt-8">
                    <h3 class="text-lg font-semibold mb-4">Top Contributors</h3>
                    <div id="topContributors" class="space-y-3">
                        <!-- Contributors will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let adminToken = localStorage.getItem('adminToken');
        let reportsMap = null;

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (adminToken) {
                showDashboard();
                loadDashboardData();
            }
        });

        async function adminLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                
                if (result.token) {
                    adminToken = result.token;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('adminUser').textContent = result.user.fullName;
                    showDashboard();
                    loadDashboardData();
                } else {
                    alert(result.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed. Please try again.');
            }
        }

        function showDashboard() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
        }

        function logout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');
        }

        async function loadDashboardData() {
            try {
                await Promise.all([
                    loadAnalytics(),
                    loadReports(),
                    initReportsMap()
                ]);
            } catch (error) {
                console.error('Failed to load dashboard data:', error);
            }
        }

        async function loadAnalytics() {
            try {
                const response = await fetch(`${API_BASE}/admin/civic-analytics`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();

                document.getElementById('totalReports').textContent = data.totalReports;
                
                const pending = data.reportsByStatus.find(s => s.status === 'pending')?.count || 0;
                const resolved = data.reportsByStatus.find(s => s.status === 'resolved')?.count || 0;
                
                document.getElementById('pendingReports').textContent = pending;
                document.getElementById('resolvedReports').textContent = resolved;
                document.getElementById('activeUsers').textContent = data.topReporters.length;

                // Create charts
                createTypeChart(data.reportsByType);
                createStatusChart(data.reportsByStatus);
                loadTopContributors(data.topReporters);

            } catch (error) {
                console.error('Failed to load analytics:', error);
            }
        }

        async function loadReports() {
            try {
                const status = document.getElementById('statusFilter').value;
                const type = document.getElementById('typeFilter').value;
                
                const params = new URLSearchParams();
                if (status) params.append('status', status);
                if (type) params.append('type', type);
                
                const response = await fetch(`${API_BASE}/admin/civic-reports?${params}`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const reports = await response.json();

                const tbody = document.getElementById('reportsTableBody');
                tbody.innerHTML = reports.map(report => `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div>
                                <div class="text-sm font-medium text-gray-900">${report.title}</div>
                                <div class="text-sm text-gray-500">${report.description.substring(0, 50)}...</div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                ${report.type}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                            ${report.full_name}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusColor(report.status)}">
                                ${report.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${new Date(report.created_at).toLocaleDateString()}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <select onchange="updateReportStatus(${report.id}, this.value)" class="text-sm border rounded px-2 py-1">
                                <option value="pending" ${report.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="in_progress" ${report.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                                <option value="resolved" ${report.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                            </select>
                        </td>
                    </tr>
                `).join('');

                // Update map markers
                updateMapMarkers(reports);

            } catch (error) {
                console.error('Failed to load reports:', error);
            }
        }

        function getStatusColor(status) {
            switch (status) {
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'in_progress': return 'bg-blue-100 text-blue-800';
                case 'resolved': return 'bg-green-100 text-green-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        async function updateReportStatus(reportId, newStatus) {
            try {
                await fetch(`${API_BASE}/admin/civic-reports/${reportId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ status: newStatus, priority: 'medium' })
                });
                
                // Reload data
                loadDashboardData();
            } catch (error) {
                console.error('Failed to update report:', error);
                alert('Failed to update report status');
            }
        }

        function initReportsMap() {
            if (reportsMap) return;
            
            reportsMap = L.map('reportsMap').setView([-15.4167, 28.2833], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(reportsMap);
        }

        function updateMapMarkers(reports) {
            if (!reportsMap) return;
            
            // Clear existing markers
            reportsMap.eachLayer(layer => {
                if (layer instanceof L.Marker) {
                    reportsMap.removeLayer(layer);
                }
            });
            
            // Add new markers
            reports.forEach(report => {
                if (report.latitude && report.longitude) {
                    const color = report.status === 'resolved' ? 'green' : 
                                 report.status === 'in_progress' ? 'blue' : 'red';
                    
                    const marker = L.marker([report.latitude, report.longitude]).addTo(reportsMap);
                    marker.bindPopup(`
                        <div style="min-width: 200px;">
                            <h4 style="font-weight: bold; margin-bottom: 4px;">${report.title}</h4>
                            <p style="margin-bottom: 4px;"><strong>Type:</strong> ${report.type}</p>
                            <p style="margin-bottom: 4px;"><strong>Status:</strong> ${report.status}</p>
                            <p style="margin-bottom: 4px;"><strong>Reporter:</strong> ${report.full_name}</p>
                            <p style="font-size: 12px; color: #666;">${report.description}</p>
                        </div>
                    `);
                }
            });
        }

        function createTypeChart(data) {
            const ctx = document.getElementById('reportsTypeChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.type),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: [
                            '#EF4444', '#3B82F6', '#EAB308', '#10B981', '#8B5CF6'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function createStatusChart(data) {
            const ctx = document.getElementById('reportsStatusChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.status),
                    datasets: [{
                        label: 'Reports',
                        data: data.map(d => d.count),
                        backgroundColor: ['#EAB308', '#3B82F6', '#10B981']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function loadTopContributors(contributors) {
            const container = document.getElementById('topContributors');
            container.innerHTML = contributors.slice(0, 10).map((contributor, index) => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                            ${index + 1}
                        </span>
                        <div>
                            <p class="font-medium">${contributor.full_name}</p>
                            <p class="text-sm text-gray-500">${contributor.email}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-blue-600">${contributor.report_count} reports</p>
                        <p class="text-sm text-gray-500">K${contributor.cash_earned} earned</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
