<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Zambia - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold gradient-text mb-2">Smart Zambia</h1>
            <p class="text-gray-600">Explore • Report • Earn Rewards</p>
        </div>

        <!-- Auth Container -->
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <!-- Login Form -->
            <div id="loginForm">
                <h2 class="text-2xl font-bold text-center mb-6">Welcome Back!</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email
                        </label>
                        <input type="email" id="loginEmail" required 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-all">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input type="password" id="loginPassword" required 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-all">
                    </div>
                    <button type="submit" id="loginBtn" 
                            class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3 rounded-xl hover:from-orange-600 hover:to-red-600 transition-all transform hover:scale-105">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                </form>
                <div class="text-center mt-6">
                    <p class="text-gray-600">Don't have an account? 
                        <button onclick="showRegister()" class="text-orange-500 font-bold hover:text-orange-600">Sign Up</button>
                    </p>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <h2 class="text-2xl font-bold text-center mb-6">Join Smart Zambia!</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                            <i class="fas fa-user mr-2"></i>Full Name
                        </label>
                        <input type="text" id="registerName" required 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-all">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email
                        </label>
                        <input type="email" id="registerEmail" required 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-all">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input type="password" id="registerPassword" required minlength="6"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-all">
                        <p class="text-xs text-gray-500 mt-1">Minimum 6 characters</p>
                    </div>
                    <button type="submit" id="registerBtn"
                            class="w-full bg-gradient-to-r from-green-500 to-blue-500 text-white font-bold py-3 rounded-xl hover:from-green-600 hover:to-blue-600 transition-all transform hover:scale-105">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                </form>
                <div class="text-center mt-6">
                    <p class="text-gray-600">Already have an account? 
                        <button onclick="showLogin()" class="text-orange-500 font-bold hover:text-orange-600">Login</button>
                    </p>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden text-center py-8">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-gray-600">Please wait...</p>
            </div>
        </div>

        <!-- Features Preview -->
        <div class="mt-8 grid grid-cols-3 gap-4 text-center">
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-4">
                <i class="fas fa-map-marked-alt text-2xl text-orange-500 mb-2"></i>
                <p class="text-sm font-semibold">Explore Destinations</p>
            </div>
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-4">
                <i class="fas fa-city text-2xl text-blue-500 mb-2"></i>
                <p class="text-sm font-semibold">Report Issues</p>
            </div>
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-4">
                <i class="fas fa-coins text-2xl text-green-500 mb-2"></i>
                <p class="text-sm font-semibold">Earn Rewards</p>
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="successToast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="successMessage">Success!</span>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span id="errorMessage">Error!</span>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                // Redirect to main app
                window.location.href = 'index.html';
            }
        });

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showLoading() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showToast(type, message) {
            const toast = document.getElementById(type + 'Toast');
            const messageEl = document.getElementById(type + 'Message');
            messageEl.textContent = message;
            
            toast.classList.remove('translate-x-full');
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            showLoading();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.token) {
                    // Save token and user data
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('userData', JSON.stringify(result.user));
                    
                    showToast('success', `Welcome back, ${result.user.fullName}!`);
                    
                    // Redirect to main app after short delay
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    hideLoading();
                    showToast('error', result.error || 'Login failed');
                }
            } catch (error) {
                hideLoading();
                console.error('Login error:', error);
                showToast('error', 'Network error. Please try again.');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            showLoading();

            const fullName = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, fullName })
                });

                const result = await response.json();

                if (result.id) {
                    showToast('success', 'Account created! Please login.');
                    
                    // Clear form and switch to login
                    document.getElementById('registerName').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    
                    setTimeout(() => {
                        hideLoading();
                        showLogin();
                        // Pre-fill login email
                        document.getElementById('loginEmail').value = email;
                    }, 1500);
                } else {
                    hideLoading();
                    showToast('error', result.error || 'Registration failed');
                }
            } catch (error) {
                hideLoading();
                console.error('Register error:', error);
                showToast('error', 'Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
